AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MeetingMind - Relevance-aware meeting intelligence system

Globals:
  Function:
    Runtime: python3.11
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        PROFILES_TABLE: !Ref ProfilesTable
        MEETINGS_TABLE: !Ref MeetingsTable
        RECORDINGS_BUCKET: !Ref RecordingsBucket
        AWS_REGION_NAME: !Ref AWS::Region
        BEDROCK_MODEL_ID: 'us.anthropic.claude-sonnet-4-20250514-v1:0'

Resources:
  # S3 Bucket for recordings and embeddings
  RecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub meetingmind-recordings-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - "*"
            MaxAge: 3600

  # DynamoDB Tables
  ProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: meetingmind-profiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  MeetingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: meetingmind-meetings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: meetingId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: uploadedAt
          AttributeType: S
      KeySchema:
        - AttributeName: meetingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-uploadedAt-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: uploadedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Lambda Layer for numpy
  NumpyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: numpy-layer
      Description: NumPy for cosine similarity
      ContentUri: ../layers/numpy-layer/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # ─── CORS Preflight Handler ───────────────────────────────────────────────
  # Handles all OPTIONS requests across every route with no auth,
  # so API Gateway's Cognito authorizer never blocks preflight requests.
  CorsPreflightFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-cors-preflight
      InlineCode: |
        def lambda_handler(event, context):
            return {
                "statusCode": 200,
                "headers": {
                    "Access-Control-Allow-Origin": "*",
                    "Access-Control-Allow-Headers": "Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token",
                    "Access-Control-Allow-Methods": "OPTIONS,POST,GET,PUT,DELETE"
                },
                "body": ""
            }
      Handler: index.lambda_handler
      Runtime: python3.11
      Timeout: 10
      MemorySize: 128
      Events:
        ProfileOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /profile
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        MeetingsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        MeetingIdOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        MeetingStatusOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}/status
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        MeetingAnalyzeOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}/analyze
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        MeetingChatOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}/chat
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        UploadOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/upload
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        UploadUrlOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/upload-url
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        ProcessOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/process
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        AnalyzeTextOptions:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/analyze-text
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  # ─── Lambda Functions ─────────────────────────────────────────────────────
  UploadMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-upload-meeting
      CodeUri: ../lambdas/upload_meeting/
      Handler: handler.lambda_handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref RecordingsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref MeetingsTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
              Resource: "*"
      Events:
        UploadApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/upload
            Method: POST
        UploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/upload-url
            Method: POST
        ProcessMeeting:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/process
            Method: POST

  PollTranscriptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-poll-transcription
      CodeUri: ../lambdas/poll_transcription/
      Handler: handler.lambda_handler
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref RecordingsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref MeetingsTable
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:GetTranscriptionJob
              Resource: "*"
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt AnalyzeMeetingFunction.Arn
      Events:
        PollApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}/status
            Method: GET

  AnalyzeMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-analyze-meeting
      CodeUri: ../lambdas/analyze_meeting/
      Handler: handler.lambda_handler
      Timeout: 300
      MemorySize: 1024
      Layers:
        - !Ref NumpyLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MeetingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfilesTable
        - S3CrudPolicy:
            BucketName: !Ref RecordingsBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub arn:aws:bedrock:*::foundation-model/anthropic.claude-*
                - !Sub arn:aws:bedrock:*::foundation-model/amazon.titan-embed-text-v1
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*
      Events:
        AnalyzeApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}/analyze
            Method: POST
        AnalyzeTextApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/analyze-text
            Method: POST

  SaveProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-save-profile
      CodeUri: ../lambdas/save_profile/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfilesTable
      Events:
        SaveProfileApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /profile
            Method: POST

  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-get-profile
      CodeUri: ../lambdas/get_profile/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProfilesTable
      Events:
        GetProfileApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /profile
            Method: GET

  GetMeetingDigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-get-meeting-digest
      CodeUri: ../lambdas/get_meeting_digest/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MeetingsTable
      Events:
        GetMeetingApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}
            Method: GET

  ListMeetingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-list-meetings
      CodeUri: ../lambdas/list_meetings/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MeetingsTable
      Events:
        ListMeetingsApi:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings
            Method: GET

  ChatMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: meetingmind-chat-meeting
      CodeUri: ../lambdas/chat_meeting/
      Handler: handler.lambda_handler
      Timeout: 300
      MemorySize: 1024
      Layers:
        - !Ref NumpyLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MeetingsTable
        - S3ReadPolicy:
            BucketName: !Ref RecordingsBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub arn:aws:bedrock:*::foundation-model/anthropic.claude-*
                - !Sub arn:aws:bedrock:*::foundation-model/amazon.titan-embed-text-v1
                - !Sub arn:aws:bedrock:*::foundation-model/amazon.nova-pro-v1:0
                - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-pro-v1:0
                - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        ChatMeeting:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingMindApi
            Path: /meetings/{meetingId}/chat
            Method: POST

  # ─── Cognito ──────────────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: meetingmind-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: meetingmind-client
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # ─── API Gateway ──────────────────────────────────────────────────────────
  MeetingMindApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
      Cors:
        AllowMethods: "'OPTIONS,POST,GET,PUT,DELETE'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # Gateway Responses for CORS on errors (4xx/5xx from authorizer get headers too)
  GatewayResponseDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_4XX
      RestApiId: !Ref MeetingMindApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,POST,GET,PUT,DELETE'"

  GatewayResponseDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseType: DEFAULT_5XX
      RestApiId: !Ref MeetingMindApi
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'OPTIONS,POST,GET,PUT,DELETE'"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${MeetingMindApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  RecordingsBucketName:
    Description: S3 bucket for recordings
    Value: !Ref RecordingsBucket
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient